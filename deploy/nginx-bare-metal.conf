# Nginx site config for a bare-metal Ubuntu + Gunicorn (unix socket) deployment.
# Place at /etc/nginx/sites-available/inventory and symlink into sites-enabled.
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    client_max_body_size 20M;

    location /static/ {
        alias /var/www/inventory_management/staticfiles/;
        expires 30d;
    }
    location /media/ {
        alias /var/www/inventory_management/media/;
        expires 7d;
    }
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/inventory.sock;
    }
}
