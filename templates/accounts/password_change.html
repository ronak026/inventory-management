{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="mx-auto max-w-xl">
  <div class="form-card">
    <div class="form-card-header">
      <div class="form-card-icon"><i class="bi bi-key"></i></div>
      <div>
        <h1 class="text-lg font-semibold text-gray-900">Change Password</h1>
        <p class="text-sm text-gray-500">Choose a strong, unique password.</p>
      </div>
    </div>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-section">{% include "partials/form_fields.html" %}</div>
      <div class="form-actions">
        <a href="{% url 'accounts:profile' %}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Update Password</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
