{% extends "base_auth.html" %}
{% block subtitle %}Reset your password{% endblock %}
{% block content %}
<p class="mb-5 text-sm text-gray-500">Enter your account email and we'll send you a reset link.</p>
<form method="post" novalidate class="space-y-5">
  {% csrf_token %}
  <div>
    <label class="label">Email</label>
    <div class="relative">
      <i class="bi bi-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input type="email" name="email" class="form-input pl-10" required placeholder="you@example.com">
    </div>
  </div>
  <button type="submit" class="btn btn-primary w-full"><i class="bi bi-send"></i> Send reset link</button>
  <div class="text-center"><a href="{% url 'accounts:login' %}" class="text-sm text-brand-600 hover:underline">Back to login</a></div>
</form>
{% endblock %}
