{% extends "base_auth.html" %}
{% block subtitle %}Choose a new password{% endblock %}
{% block content %}
{% if validlink %}
<form method="post" novalidate class="form-auto space-y-1">
  {% csrf_token %}
  {% include "partials/form_fields.html" %}
  <button type="submit" class="btn btn-primary w-full"><i class="bi bi-check-lg"></i> Set new password</button>
</form>
{% else %}
<div class="flex items-start gap-2 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
  <i class="bi bi-exclamation-triangle-fill mt-0.5"></i><div>This reset link is invalid or has expired.</div>
</div>
<a href="{% url 'accounts:password_reset' %}" class="btn btn-outline mt-4 w-full">Request a new link</a>
{% endif %}
{% endblock %}
