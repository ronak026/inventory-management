{% extends "base.html" %}
{% block title %}Delete User{% endblock %}
{% block content %}
<h1 class="mb-6 text-2xl font-bold text-gray-900">Delete User</h1>
<div class="card max-w-xl p-6">
  <p class="mb-4 text-gray-700">Are you sure you want to delete <strong>{{ object.username }}</strong>? This cannot be undone.</p>
  <form method="post" class="flex gap-2">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'accounts:user_list' %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
