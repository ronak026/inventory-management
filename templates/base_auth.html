{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Inventory Management{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  {% include "partials/tailwind_head.html" %}
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-brand-800 p-4">
  <div class="w-full max-w-md card p-8">
    <div class="text-center mb-6">
      <i class="bi bi-box-seam-fill text-brand-600 text-4xl"></i>
      <h1 class="text-xl font-bold mt-2 text-gray-900">Inventory Management</h1>
      <p class="text-sm text-gray-500">{% block subtitle %}Sign in to continue{% endblock %}</p>
    </div>
    {% include "partials/messages.html" %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
