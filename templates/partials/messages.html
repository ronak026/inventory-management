{% if messages %}
<div class="mb-4 space-y-2">
  {% for message in messages %}
  {% with tag=message.tags %}
  <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)"
       class="flex items-start justify-between gap-3 rounded-lg border px-4 py-3 text-sm
       {% if tag == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800
       {% elif tag == 'danger' %}border-red-200 bg-red-50 text-red-800
       {% elif tag == 'warning' %}border-amber-200 bg-amber-50 text-amber-800
       {% elif tag == 'info' %}border-sky-200 bg-sky-50 text-sky-800
       {% else %}border-gray-200 bg-gray-50 text-gray-700{% endif %}">
    <span>{{ message }}</span>
    <button @click="show = false" class="text-current/60 hover:text-current"><i class="bi bi-x-lg"></i></button>
  </div>
  {% endwith %}
  {% endfor %}
</div>
{% endif %}
