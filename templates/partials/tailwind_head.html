{% comment %}
Shared <head> assets for Tailwind CSS. Included by base.html and base_auth.html.
Uses the Tailwind Play CDN (zero build tooling). For production you can swap this
for a compiled Tailwind stylesheet — see README "Switching to a Tailwind build".
{% endcomment %}
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
            800: '#3730a3', 900: '#312e81',
          },
        },
      },
    },
  };
</script>
<style type="text/tailwindcss">
  @layer components {
    /* Buttons */
    .btn { @apply inline-flex items-center justify-center gap-1.5 rounded-lg px-4 py-2 text-sm font-medium transition focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-1; }
    .btn-sm { @apply px-2.5 py-1.5 text-xs; }
    .btn-primary { @apply bg-brand-600 text-white hover:bg-brand-700; }
    .btn-outline { @apply border border-gray-300 bg-white text-gray-700 hover:bg-gray-50; }
    .btn-danger { @apply bg-red-600 text-white hover:bg-red-700; }
    .btn-success { @apply bg-emerald-600 text-white hover:bg-emerald-700; }
    .btn-link { @apply text-gray-500 hover:text-gray-700 underline-offset-2 hover:underline; }

    /* Surfaces */
    .card { @apply bg-white rounded-xl shadow-sm ring-1 ring-gray-100; }

    /* Form controls */
    .form-input, .form-select, .form-textarea {
      @apply block w-full rounded-lg border border-gray-300 bg-white px-3.5 py-2.5 text-sm text-gray-900 shadow-sm transition
             placeholder:text-gray-400 hover:border-gray-400
             focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30
             disabled:cursor-not-allowed disabled:bg-gray-50 disabled:text-gray-400;
    }
    .form-textarea { @apply leading-relaxed; }
    .form-check { @apply h-4 w-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500; }
    .label { @apply mb-1.5 block text-sm font-medium text-gray-700; }

    /* Form layout: card-framed form with header / sections / action bar */
    .form-card { @apply overflow-hidden rounded-2xl bg-white shadow-sm ring-1 ring-gray-100; }
    .form-card-header { @apply flex items-center gap-3 border-b border-gray-100 bg-gray-50/70 px-6 py-4; }
    .form-card-icon { @apply flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-brand-50 text-lg text-brand-600; }
    .form-section { @apply px-6 py-5; }
    .form-section + .form-section { @apply border-t border-gray-100; }
    .form-section-title { @apply mb-4 flex items-center gap-2 text-xs font-semibold uppercase tracking-wide text-gray-400; }
    .form-actions { @apply flex items-center justify-end gap-2 border-t border-gray-100 bg-gray-50/70 px-6 py-4; }
    .field-help { @apply mt-1.5 text-xs text-gray-500; }
    /* Django renders password rules as a <ul>; Tailwind's reset strips bullets,
       so restore a tidy requirements box. */
    .field-help ul { @apply mt-1 list-disc space-y-1 rounded-lg bg-gray-50 py-2.5 pl-7 pr-3 text-gray-500 marker:text-brand-400; }
    .field-help li { @apply text-xs leading-relaxed; }
    .field-error { @apply mt-1.5 flex items-center gap-1 text-xs font-medium text-red-600; }

    /* Tables */
    .table-th { @apply px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-gray-500; }
    .table-td { @apply px-4 py-3 text-sm text-gray-700 align-middle; }

    /* Badges */
    .badge { @apply inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium; }

    /* Generic raw-form container: style Django's built-in widgets without per-field classes */
    .form-auto :is(input[type=text], input[type=email], input[type=password], input[type=number], input[type=date], textarea, select) {
      @apply block w-full rounded-lg border border-gray-300 bg-white px-3.5 py-2.5 text-sm text-gray-900 shadow-sm transition
             hover:border-gray-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30;
    }
    /* Invalid fields: red border/ring when the wrapping group has errors */
    .has-error :is(input, select, textarea) {
      @apply border-red-400 focus:border-red-500 focus:ring-red-500/30;
    }
  }
</style>
{% load static %}
<script defer src="{% static 'js/alpine.min.js' %}"></script>
