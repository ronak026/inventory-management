{% if status == 'completed' %}<span class="badge bg-emerald-100 text-emerald-700">Completed</span>
{% elif status == 'cancelled' %}<span class="badge bg-red-100 text-red-700">Cancelled</span>
{% elif status == 'released' %}<span class="badge bg-sky-100 text-sky-700">Released</span>
{% elif status == 'in_progress' %}<span class="badge bg-amber-100 text-amber-700">In Progress</span>
{% else %}<span class="badge bg-gray-100 text-gray-600">Draft</span>{% endif %}
