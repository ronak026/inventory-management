{% extends "base.html" %}
{% block title %}Delete Work Order{% endblock %}
{% block content %}
<div class="mx-auto max-w-xl">
  <div class="card p-6">
    <h1 class="mb-3 text-xl font-bold text-gray-900">Delete Work Order</h1>
    <p class="mb-4 text-gray-700">Delete <strong>{{ object.wo_number }}</strong>? Any reserved materials will be released. This cannot be undone.</p>
    <form method="post" class="flex gap-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, delete</button>
      <a href="{{ object.get_absolute_url }}" class="btn btn-outline">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
