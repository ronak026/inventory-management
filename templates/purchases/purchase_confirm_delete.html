{% extends "base.html" %}
{% block title %}Delete Purchase Order{% endblock %}
{% block content %}
<h1 class="mb-6 text-2xl font-bold text-gray-900">Delete Purchase Order</h1>
<div class="card max-w-xl p-6">
  <p class="mb-4 text-gray-700">Delete purchase order <strong>{{ object.po_number }}</strong>? This does not reverse any stock already received.</p>
  <form method="post" class="flex gap-2">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'purchases:detail' object.pk %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
