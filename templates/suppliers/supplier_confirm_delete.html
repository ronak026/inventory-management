{% extends "base.html" %}
{% block title %}Delete Supplier{% endblock %}
{% block content %}
<h1 class="mb-6 text-2xl font-bold text-gray-900">Delete Supplier</h1>
<div class="card max-w-xl p-6">
  <p class="mb-4 text-gray-700">Delete supplier <strong>{{ object.name }}</strong>? Related purchase orders must be removed first.</p>
  <form method="post" class="flex gap-2">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'suppliers:list' %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
